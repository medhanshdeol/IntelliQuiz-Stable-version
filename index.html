<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliQuiz | AI & ML Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; }
        .bg-sky-blue { background-color: #0ea5e9; }
        .text-sky-blue { color: #0ea5e9; }
        .bg-action-red { background-color: #ef4444; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        .animate-slide-in { animation: slideIn 0.4s ease-out forwards; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>
</head>
<body class="text-white min-h-screen overflow-hidden">

    <div class="flex flex-col md:flex-row h-screen">
        
        <div class="w-full md:w-5/12 bg-sky-blue p-10 flex flex-col justify-between text-black relative">
            <div>
                <h2 class="text-xl font-black uppercase tracking-widest mb-1">STABLE VERSION</h2>
                <div class="w-12 h-2 bg-black"></div>
            </div>
            
            <div>
                <h1 class="text-7xl md:text-9xl font-black leading-none mb-4 uppercase tracking-tighter">
                    Intelli<br>Quiz.
                </h1>
                <p class="text-lg font-bold max-w-xs leading-tight uppercase">
                    GENERATIVE AI TUTOR • NATIVE ML ENGINE.
                </p>
            </div>

            <div class="text-xs font-black uppercase border-t-4 border-black pt-4 inline-block">
                Project 2026
            </div>
        </div>

        <div class="w-full md:w-7/12 p-8 md:p-16 overflow-y-auto custom-scroll bg-black">
            
            <div class="mb-12">
                <div id="scoreBoard" class="hidden mb-10 animate-slide-in">
                    <div class="flex items-center gap-6">
                        <span class="bg-action-red text-white px-6 py-2 font-black text-xs uppercase italic skew-x-[-15deg]">Score</span>
                        <span class="text-6xl font-black tracking-tighter"><span id="correctCount">0</span><span class="text-sky-blue">/</span><span id="totalCount">0</span></span>
                    </div>
                </div>

                <div class="flex flex-col gap-6">
                    <input type="text" id="topicInput" placeholder="ENTER TOPIC" 
                           class="bg-transparent border-b-8 border-white text-3xl font-black p-2 outline-none focus:border-sky-blue placeholder:text-gray-800 uppercase italic">
                    
                    <div class="flex gap-4">
                        <button onclick="getQuiz()" class="bg-white text-black px-10 py-5 font-black uppercase hover:bg-sky-blue transition-all active:scale-95 text-lg">
                            Build Quiz
                        </button>
                        <button onclick="runML()" class="border-4 border-white px-10 py-5 font-black uppercase hover:bg-action-red transition-all active:scale-95 text-lg">
                            ML Analysis
                        </button>
                    </div>
                </div>
            </div>

            <div id="loading" class="hidden flex flex-col items-center justify-center py-10 animate-slide-in">
                <div class="w-16 h-16 border-8 border-white/10 border-t-sky-blue rounded-full animate-spin mb-4"></div>
                <p class="text-sky-blue text-xl font-black uppercase tracking-widest">Generating 10 Questions...</p>
            </div>
            
            <div id="mlOutput" class="hidden mb-12 animate-slide-in">
                <pre id="mlResultsText" class="bg-zinc-900 p-8 text-xs text-sky-blue font-mono border-l-8 border-sky-blue overflow-x-auto"></pre>
            </div>

            <div id="quizContainer" class="space-y-6"></div>
        </div>
    </div>

    <script>
        let correctAnswers = 0;

        async function getQuiz() {
            const topic = document.getElementById('topicInput').value;
            const container = document.getElementById('quizContainer');
            if (!topic) return alert("TOPIC REQUIRED");

            correctAnswers = 0;
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('scoreBoard').classList.add('hidden');
            container.innerHTML = '';

            try {
                const res = await fetch(`http://localhost:8000/generate-quiz?topic=${encodeURIComponent(topic)}`);
                const data = await res.json();

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('scoreBoard').classList.remove('hidden');
                document.getElementById('totalCount').innerText = data.length;
                document.getElementById('correctCount').innerText = "0";

                data.forEach((q, i) => {
                    const card = document.createElement('div');
                    card.className = "group animate-slide-in mb-8";
                    
                    let optionsHtml = q.options.map(opt => `
                        <button onclick="checkAnswer(this, '${q.answer.replace(/'/g, "\\'")}')" 
                                class="flex-1 bg-white text-black p-4 font-black text-sm uppercase hover:bg-sky-blue transition-all border-r border-black last:border-0 option-btn">
                            ${opt}
                        </button>
                    `).join('');

                    card.innerHTML = `
                        <div class="bg-zinc-900 p-5 flex items-start gap-6 border-l-8 border-action-red">
                            <span class="font-black text-3xl text-action-red">0${i+1}</span>
                            <span class="font-bold uppercase text-lg leading-tight pt-1">${q.question}</span>
                        </div>
                        <div class="flex flex-col md:flex-row mt-1 options-group">
                            ${optionsHtml}
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) { alert("SERVER OFFLINE"); }
        }

        function checkAnswer(button, correct) {
            const cleanUserSelection = button.innerText.replace(/[.✅✕]/g, '').trim().toLowerCase();
            const cleanCorrectAnswer = correct.replace(/[.]/g, '').trim().toLowerCase();
            
            const isCorrect = cleanUserSelection === cleanCorrectAnswer;
            const parent = button.closest('.group');
            const buttons = parent.querySelectorAll('.option-btn');

            if (isCorrect) {
                button.classList.remove('bg-white', 'text-black');
                button.classList.add('bg-sky-blue', 'text-white');
                button.innerHTML += " ✓";
                correctAnswers++;
                document.getElementById('correctCount').innerText = correctAnswers;
            } else {
                button.classList.remove('bg-white', 'text-black');
                button.classList.add('bg-action-red', 'text-white');
                button.innerHTML += " ✕";
                
                buttons.forEach(btn => {
                    const btnText = btn.innerText.replace(/[.✅✕]/g, '').trim().toLowerCase();
                    if (btnText === cleanCorrectAnswer) {
                        btn.classList.remove('bg-white', 'text-black');
                        btn.classList.add('bg-sky-blue', 'text-white', 'font-black');
                        btn.innerHTML += " [CORRECT]";
                    }
                });
            }
            buttons.forEach(btn => btn.disabled = true);
        }

        async function runML() {
            const topic = document.getElementById('topicInput').value;
            const out = document.getElementById('mlOutput');
            const txt = document.getElementById('mlResultsText');
            if (!topic) return alert("TOPIC REQUIRED");
            out.classList.remove('hidden');
            txt.innerText = "CALCULATING...";
            try {
                const res = await fetch(`http://localhost:8000/run-ml?topic=${encodeURIComponent(topic)}`);
                const data = await res.json();
                txt.innerText = JSON.stringify(data, null, 4);
            } catch (e) { txt.innerText = "ML ERROR"; }
        }
    </script>
</body>
</html>
