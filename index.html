<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>IntelliQuiz | Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@400;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
        }

        .bg-brand {
            background-color: #a855f7; /* Vibrant AI Purple */
        }

        .heading-main {
            font-size: 110px;
            line-height: 0.85;
            letter-spacing: -0.05em;
        }

        .option-btn {
            text-align: left;
            padding: 12px;
            width: 100%;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: 900;
            color: #94a3b8;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            border-color: white;
            color: white;
            background: #111;
        }

        #mlTerminal {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 500px;
            height: 500px;
            background: #0a0a0a;
            border: 2px solid #333;
            display: none;
            flex-direction: column;
            font-family: 'JetBrains Mono', monospace;
            z-index: 50;
        }

        .terminal-content {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            font-size: 11px;
            color: #00ff41;
        }
    </style>
</head>

<body class="flex h-screen">
    <div class="w-[42%] bg-brand p-12 flex flex-col justify-between border-r border-black">
        <div class="mt-16">
            <h1 class="heading-main font-black text-black">INTELLI<br>QUIZ.</h1>
            <p class="mt-6 text-xl font-bold text-black tracking-widest">GENERATIVE AI TUTOR.</p>
            <p class="mt-2 text-sm font-black text-black uppercase tracking-tighter italic opacity-80">2026 Stable Build
                // RF Ensemble</p>
        </div>
        <span class="text-[10px] font-black text-black">PROJECT 2026</span>
    </div>

    <div class="flex-1 p-12 flex flex-col">
        <input type="text" id="topicInput"
            class="w-full bg-transparent border-b-4 border-white text-white text-4xl font-black p-2 focus:outline-none uppercase"
            placeholder="ENTER TOPIC...">
        <div class="flex gap-4 my-10">
            <button onclick="handleBuild()" id="btn"
                class="bg-white text-black px-10 py-4 font-black uppercase text-sm">Build Quiz</button>
            <button onclick="toggleTerm()" class="border-2 border-white px-10 py-4 font-black uppercase text-sm">ML
                Analysis</button>
        </div>
        <div id="quizContainer" class="flex-1 overflow-y-auto pr-4"></div>
    </div>

    <div id="mlTerminal">
        <div class="p-3 bg-zinc-900 flex justify-between items-center"><span
                class="text-[9px] font-bold text-zinc-500 uppercase">kernel_metrics.exe</span><button
                onclick="toggleTerm()">✕</button></div>
        <div id="terminalOutput" class="terminal-content"></div>
    </div>

    <script>
        function toggleTerm() { const t = document.getElementById('mlTerminal'); t.style.display = t.style.display === 'flex' ? 'none' : 'flex'; }

        async function handleBuild() {
            const topic = document.getElementById('topicInput').value;
            if (!topic) return;
            const btn = document.getElementById('btn');
            btn.innerText = "WAITING...";
            try {
                // Using an absolute URL so it works even if index.html is opened locally as a file
                const res = await fetch(`http://127.0.0.1:8000/generate-quiz?topic=${encodeURIComponent(topic)}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}: ` + await res.text());
                const data = await res.json();
                renderQuiz(data.quiz);
                renderML(data.ml_analysis);
            } catch (e) {
                console.error("Fetch Error:", e);
                document.getElementById('quizContainer').innerHTML = `<p class='text-red-500 font-black'>CRITICAL CONNECTION ERROR: ${e.message}</p>`;
            } finally { btn.innerText = "Build Quiz"; }
        }

        function renderQuiz(qs) {
            document.getElementById('quizContainer').innerHTML = qs.map((q, i) => `
                <div class="mb-12 border-b border-zinc-900 pb-8 q-block">
                    <p class="text-4xl font-black mb-8 uppercase text-white">${q.question}</p>
                    <div class="space-y-2">
                        ${q.options.map(opt => `<button onclick="check(this, '${opt}', '${q.answer}')" class="option-btn">• ${opt}</button>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function check(btn, sel, ans) {
            const block = btn.closest('.q-block');
            block.querySelectorAll('button').forEach(b => {
                b.disabled = true;
                if (b.innerText.toLowerCase().includes(ans.toLowerCase())) b.classList.add('bg-green-500', 'text-black');
            });
            if (!btn.innerText.toLowerCase().includes(ans.toLowerCase())) btn.classList.add('bg-red-600', 'text-black');
        }

        function renderML(ml) {
            const gains = Object.entries(ml.gains || {}).map(([f, v]) => `[${f.toUpperCase()}] GAIN: ${v.toFixed(4)}`).join('<br>');
            const logs = (ml.rf_logs || []).map(l => `> ${l}`).join('<br>');
            document.getElementById('terminalOutput').innerHTML = `
                <p class='text-white underline mb-2'>KERNEL STATUS: ACTIVE</p>
                <p class='text-2xl font-bold mb-4'>ENTROPY: ${ml.entropy.toFixed(5)}</p>
                <p class='mb-6'>${gains}</p>
                <p class='text-white underline mb-2'>RANDOM FOREST BOOTSTRAP LOGS</p>
                <p class='text-zinc-500'>${logs}</p>
            `;
        }
    </script>
</body>

</html>
